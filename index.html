<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RicoRico 🍩</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-pink-50">

<script>
const ADMIN_PASSWORD = "RicoRico220125";
const whatsappLink = "https://wa.me/5492617025691?text=";

let isAdmin = false;
let cart = [];

let products = {
  donas: [
    { name: "Donitas Simples", price: 4000, img: "https://images.unsplash.com/photo-1626094309830-abbb0c99da4c" },
    { name: "Donitas Chocolate", price: 4400, img: "https://images.unsplash.com/photo-1608198093002-ad4e005484ec" },
    { name: "Donitas Oreo", price: 5000, img: "https://images.unsplash.com/photo-1627308595229-7830a5c91f9f" },
    { name: "Donitas Coco", price: 4500, img: "https://images.unsplash.com/photo-1612203985729-70726954388b" }
  ],
  alfajores: [
    { name: "Alfajores Maicena", price: 5000, img: "https://images.unsplash.com/photo-1606313564200-e75d5e30476c" },
    { name: "Alfajores Chocolate", price: 8500, img: "https://images.unsplash.com/photo-1612197527888-7c6b9b6b7b1b" }
  ],
  galletas: [
    { name: "Galletas Chips Chocolate", price: 3000, img: "https://images.unsplash.com/photo-1499636136210-6f4ee915583e" },
    { name: "Galletas Bañadas", price: 4000, img: "https://images.unsplash.com/photo-1541592106381-b31e9677c0e5" }
  ],
  bizcochuelos: [
    { name: "Bizcochuelo Marmolado", price: 9500, img: "https://images.unsplash.com/photo-1578985545062-69928b1d9587" },
    { name: "Bizcochuelo Chocolate", price: 9500, img: "https://images.unsplash.com/photo-1606313564200-e75d5e30476c" }
  ]
};

function loginAdmin() {
  const pass = prompt("Contraseña admin");
  if (pass === ADMIN_PASSWORD) {
    isAdmin = true;
    render();
  }
}

function addToCart(name, price) {
  cart.push({ name, price });
  render();
}

function total() {
  return cart.reduce((a,b) => a + b.price, 0);
}

function sendWhatsApp() {
  const text =
    "Pedido:%0A" +
    cart.map(i => "- " + i.name).join("%0A") +
    "%0ATotal: $" + total();

  window.open(whatsappLink + text, "_blank");
}

function updatePrice(cat, i, value) {
  products[cat][i].price = Number(value);
  render();
}

function deleteProduct(cat, i) {
  products[cat].splice(i, 1);
  render();
}

function render() {
  let html = "";

  html += `
  <div class="bg-pink-500 text-white text-center p-6">
    <h1 class="text-4xl font-bold">🍩 RICORICO</h1>

    <button onclick="sendWhatsApp()"
      class="bg-white text-pink-600 px-4 py-2 mt-3 rounded">
      Pedido ($${total()})
    </button>
  </div>
  `;

  if (!isAdmin) {
    html += `
      <button onclick="loginAdmin()"
        class="fixed top-4 right-4 bg-yellow-400 px-3 py-1 rounded">
        Admin
      </button>
    `;
  }

  for (let cat in products) {
    html += `<div class="p-4">
      <h2 class="text-xl font-bold text-pink-600 capitalize">${cat}</h2>

      <div class="grid grid-cols-2 md:grid-cols-3 gap-4">`;

    products[cat].forEach((p, i) => {
      html += `
      <div class="bg-white p-3 rounded shadow">

        <img src="${p.img}" class="h-28 w-full object-cover rounded mb-2"/>

        <p class="font-bold">${p.name}</p>
        <p>$${p.price}</p>

        <button onclick="addToCart('${p.name}',${p.price})"
          class="bg-pink-500 text-white w-full mt-2">
          Agregar
        </button>

        ${isAdmin ? `
          <input type="number" value="${p.price}"
            onchange="updatePrice('${cat}',${i},this.value)"
            class="border w-full mt-2"/>

          <button onclick="deleteProduct('${cat}',${i})"
            class="bg-red-500 text-white w-full mt-1">
            Eliminar
          </button>
        ` : ""}
      </div>
      `;
    });

    html += `</div></div>`;
  }

  document.body.innerHTML = html;
}

render();
</script>

</body>
</html>
